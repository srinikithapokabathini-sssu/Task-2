<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card p-4 shadow" style="width: 400px;">
    
    <h3 class="text-center">Register</h3>

    <form id="registerForm">
      <input type="text" class="form-control mb-2" placeholder="Name" id="name">
      <input type="email" class="form-control mb-2" placeholder="Email" id="email">

      <input type="password" class="form-control mb-2" placeholder="Password" id="pass1">
      <input type="password" class="form-control mb-2" placeholder="Confirm Password" id="pass2">

      <button class="btn btn-success w-100">Register</button>
    </form>

  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
